<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pokémon Champions Checker Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#e3350d;--red-dark:#b02a09;--blue:#1a73e8;--green:#0f9960;--yellow:#f5c518;--bg:#0d0f14;--surface:#161922;--surface2:#1e2230;--border:rgba(255,255,255,0.08);--text:#f0f2f8;--muted:#8890a8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Zen Kaku Gothic New',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 60px}

.header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.header-title{font-family:'Rajdhani',sans-serif;font-weight:900;font-size:20px;letter-spacing:1px;color:var(--red)}
.header-actions{display:flex;gap:8px;align-items:center}
.db-status{font-size:10px;color:var(--green)}

.container{padding:16px;max-width:800px;margin:0 auto}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:600px){.team-grid{grid-template-columns:1fr}}

.team-card{background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border)}
.team-label{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.team-label.me{color:var(--blue)}.team-label.opp{color:var(--red)}
.action-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s}
.action-btn:hover{background:var(--red);border-color:var(--red)}

/* My side slots */
.my-slots{display:flex;flex-direction:column;gap:5px}
.my-slot{display:flex;gap:4px;align-items:center}
.my-slot>div{position:relative;flex:1}

/* Opp side */
.opp-slots{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opp-slots>div{position:relative}

input.poke-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 10px;color:#fff;font-size:13px;transition:border-color .2s}
input.poke-input:focus{outline:none;border-color:var(--blue)}
.suggest-list{position:absolute;width:100%;background:var(--surface2);border:1px solid var(--border);z-index:30;max-height:150px;overflow-y:auto;border-radius:0 0 6px 6px;display:none;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.suggest-item{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.suggest-item:hover{background:var(--red)}

.config-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:9px 10px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .2s;flex-shrink:0}
.config-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff}
.config-btn.configured{border-color:var(--blue);color:var(--blue)}

.analyze-btn{width:100%;padding:15px;background:var(--red);color:#fff;border:none;border-radius:12px;font-weight:900;font-size:18px;margin-bottom:20px;cursor:pointer;transition:all .3s}
.analyze-btn:hover{background:var(--red-dark);transform:translateY(-2px);box-shadow:0 6px 20px rgba(227,53,13,.4)}

.matrix-card{background:var(--surface);border-radius:12px;padding:16px;overflow-x:auto;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:9px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:all .2s}
th{background:var(--surface2);font-weight:700}
td:hover{transform:scale(1.05);box-shadow:0 0 12px rgba(227,53,13,.3)}
.eff-2{background:rgba(227,53,13,.3);color:#ff4d4d;font-weight:bold}
.eff-05{background:rgba(26,115,232,.3);color:#4dadff}

.detail-card{display:none;background:var(--surface2);border-radius:12px;padding:20px;border:1px solid var(--yellow);margin-top:20px;animation:fadeIn .3s;overflow-wrap:anywhere}
.compare-grid{display:grid;grid-template-columns:1fr 50px 1fr;gap:12px;align-items:start}
@media(max-width:540px){.compare-grid{grid-template-columns:1fr}.vs-label{display:none}}
.pokemon-detail{background:var(--surface);border-radius:8px;padding:14px}
.pokemon-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pokemon-icon{width:64px;height:64px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;border:2px solid var(--border);flex-shrink:0;overflow:hidden}
.pokemon-icon img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;image-rendering:crisp-edges}
.pokemon-info{flex:1;min-width:0}
.side-title{font-weight:bold;font-size:15px;margin-bottom:3px}
.type-badges{display:flex;gap:4px;flex-wrap:wrap}
.type-badge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
.nature-label{font-size:10px;color:var(--muted);margin-top:3px}
.stats-section{margin-top:10px}
.stat-category{font-size:10px;color:var(--yellow);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.stat-row{display:flex;align-items:center;font-size:11px;margin-bottom:3px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);gap:4px}
.stat-label{font-family:'Rajdhani';font-weight:700;width:18px;color:var(--muted)}
.stat-base{width:28px;text-align:right;color:var(--text);font-size:11px}
.stat-arrow{color:var(--border);font-size:10px;margin:0 2px}
.stat-actual{font-family:'Rajdhani';font-weight:700;font-size:13px;color:var(--text)}
.stat-actual.nat-up{color:#ff6060}
.stat-actual.nat-down{color:#60a0ff}
.stat-ep-badge{font-size:9px;color:var(--blue);margin-left:2px;font-family:'Rajdhani'}
.vs-label{text-align:center;font-weight:900;color:var(--yellow);font-size:22px;align-self:center}
.moves-box{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.moves-title{color:var(--muted);margin-bottom:5px;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;background:var(--surface2);margin:2px;font-size:10px;border:1px solid var(--border)}

/* Type colors */
.type-ノーマル,.bg-ノーマル{background:#A8A878!important;color:#000!important}
.type-ほのお,.bg-ほのお{background:#F08030!important;color:#fff!important}
.type-みず,.bg-みず{background:#6890F0!important;color:#fff!important}
.type-でんき,.bg-でんき{background:#F8D030!important;color:#000!important}
.type-くさ,.bg-くさ{background:#78C850!important;color:#000!important}
.type-こおり,.bg-こおり{background:#98D8D8!important;color:#000!important}
.type-かくとう,.bg-かくとう{background:#C03028!important;color:#fff!important}
.type-どく,.bg-どく{background:#A040A0!important;color:#fff!important}
.type-じめん,.bg-じめん{background:#E0C068!important;color:#000!important}
.type-ひこう,.bg-ひこう{background:#A890F0!important;color:#fff!important}
.type-エスパー,.bg-エスパー{background:#F85888!important;color:#fff!important}
.type-むし,.bg-むし{background:#A8B820!important;color:#fff!important}
.type-いわ,.bg-いわ{background:#B8A038!important;color:#fff!important}
.type-ゴースト,.bg-ゴースト{background:#705898!important;color:#fff!important}
.type-ドラゴン,.bg-ドラゴン{background:#7038F8!important;color:#fff!important}
.type-あく,.bg-あく{background:#705848!important;color:#fff!important}
.type-はがね,.bg-はがね{background:#B8B8D0!important;color:#000!important}
.type-フェアリー,.bg-フェアリー{background:#EE99AC!important;color:#000!important}

/* Toast */
.toast{position:fixed;top:20px;right:20px;background:var(--surface2);color:var(--text);padding:14px 18px;border-radius:12px;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:2000;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease-out;min-width:240px}
.toast.success{border-color:var(--green);background:rgba(15,153,96,.15)}
.toast.error{border-color:var(--red);background:rgba(227,53,13,.15)}
.toast-icon{font-size:18px}.toast.success .toast-icon{color:var(--green)}.toast.error .toast-icon{color:var(--red)}
.toast-message{flex:1;font-size:13px;font-weight:500}

/* Modals */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:1000;display:none;align-items:center;justify-content:center}
.modal{background:var(--surface);border-radius:16px;padding:22px;max-width:440px;width:92%;border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.8);animation:slideUp .3s ease-out;max-height:92vh;overflow-y:auto}
.modal-title{font-weight:900;font-size:17px;margin-bottom:14px;color:var(--blue);font-family:'Rajdhani',sans-serif;letter-spacing:.5px}
.team-slot{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px;margin-bottom:7px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
.team-slot:hover{background:var(--blue);border-color:var(--blue);transform:translateX(4px)}
.team-slot.empty{opacity:.5;cursor:default}
.team-slot.empty:hover{background:var(--surface2);border-color:var(--border);transform:none}
.team-slot-number{font-family:'Rajdhani';font-weight:700;font-size:15px;color:var(--yellow)}
.team-slot-preview{font-size:11px;color:var(--muted);margin-top:3px}
.modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;width:100%;margin-top:10px;cursor:pointer;font-weight:700;transition:all .2s}
.modal-close:hover{background:var(--red);border-color:var(--red)}

/* Config Modal */
.cfg-section{margin-bottom:14px}
.cfg-section-title{font-size:10px;color:var(--yellow);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.nature-row{display:flex;align-items:center;gap:8px}
select.nature-select{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:'Zen Kaku Gothic New',sans-serif;cursor:pointer}
select.nature-select:focus{outline:none;border-color:var(--blue)}
.nature-hint{font-size:11px;color:var(--muted);margin-top:5px;height:16px}
.nature-hint .nh-up{color:#ff6060;font-weight:700}
.nature-hint .nh-down{color:#60a0ff;font-weight:700}

.ev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ev-remaining{font-size:12px;color:var(--yellow);font-weight:700}
.ev-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ev-key{font-family:'Rajdhani';font-weight:700;font-size:15px;width:18px;text-align:center;flex-shrink:0}
.ev-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-family:sans-serif;line-height:1}
.ev-btn:hover{background:var(--blue);border-color:var(--blue)}
.ev-val{font-family:'Rajdhani';font-weight:700;font-size:13px;width:22px;text-align:center;flex-shrink:0}
.ev-bar-wrap{flex:1;background:var(--surface2);border-radius:3px;height:6px;overflow:hidden}
.ev-bar{height:100%;background:var(--blue);border-radius:3px;transition:width .15s}
.ev-stat-val{font-family:'Rajdhani';font-weight:700;font-size:13px;width:34px;text-align:right;flex-shrink:0}
.ev-stat-val.nu{color:var(--text)}.ev-stat-val.up{color:#ff6060}.ev-stat-val.dn{color:#60a0ff}

.move-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.move-wrap{position:relative}
input.move-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:#fff;font-size:12px;transition:border-color .2s}
input.move-input:focus{outline:none;border-color:var(--blue)}
.msug-list{position:absolute;width:200%;left:0;background:var(--surface);border:1px solid var(--border);z-index:50;max-height:140px;overflow-y:auto;border-radius:0 0 6px 6px;display:none;box-shadow:0 6px 16px rgba(0,0,0,.8);top:100%}
.msug-item{padding:6px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;display:flex;justify-content:space-between;align-items:center;gap:6px}
.msug-item:hover{background:var(--red)}
.msug-item-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msug-meta{display:flex;align-items:center;gap:3px;flex-shrink:0}
.mtype-badge{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700}
.item-wrap{position:relative}
.item-sug-list{position:absolute;width:100%;left:0;background:var(--surface);border:1px solid var(--border);z-index:50;max-height:180px;overflow-y:auto;border-radius:0 0 6px 6px;display:none;box-shadow:0 6px 16px rgba(0,0,0,.8);top:100%}
.item-sug-item{padding:8px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.item-sug-item:hover{background:var(--red)}
.item-sug-name{font-weight:700;margin-bottom:2px}
.item-sug-desc{color:var(--muted);font-size:10px;line-height:1.4}

.cfg-submit-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:900;font-size:14px;cursor:pointer;transition:all .2s;margin-top:6px}
.cfg-submit-btn:hover{background:#1558b0}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.ev-val-input{
  width:40px;
  text-align:center;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:4px;
  color:#fff;
  font-family:'Rajdhani';
  font-weight:700;
}

.advice-card{display:block;background:var(--surface2);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:16px}
.advice-title{font-size:14px;font-weight:900;color:var(--blue);margin-bottom:10px}
.pick-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
.pick-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px}
.pick-rank{font-family:'Rajdhani';font-weight:900;color:var(--yellow);font-size:13px}
.pick-name{font-size:16px;font-weight:900;margin:2px 0 4px}
.pick-score{font-size:11px;color:var(--muted)}
.advice-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.advice-subtitle{font-size:11px;color:var(--yellow);font-weight:700;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.advice-list{display:flex;flex-direction:column;gap:6px}
.advice-line{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.6}
.role-chip{display:inline-block;padding:2px 6px;border-radius:999px;background:rgba(26,115,232,.18);border:1px solid rgba(26,115,232,.4);font-size:10px;margin-right:4px}
.warn-chip{display:inline-block;padding:2px 6px;border-radius:999px;background:rgba(227,53,13,.14);border:1px solid rgba(227,53,13,.4);font-size:10px;margin-right:4px}
.pressure-grid{display:grid;grid-template-columns:1fr;gap:8px}
.pressure-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.pressure-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
.pressure-bar-wrap{height:8px;background:var(--surface2);border-radius:999px;overflow:hidden}
.pressure-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--red));border-radius:999px}
@media(min-width:700px){.pick-grid{grid-template-columns:1fr 1fr 1fr}.pressure-grid{grid-template-columns:1fr 1fr}}



</style>
</head>
<body>

<div class="header">
  <div class="header-title">POKÉMON CHAMPIONS</div>
  <div class="header-actions">
    <button class="action-btn" onclick="clearAll()" style="padding:6px 12px;font-size:12px">🗑 クリア</button>
  </div>
  </div>

<div class="container">
  <div class="team-grid">
    <div class="team-card">
      <div class="team-label me">自分
        <button class="action-btn" onclick="openSaveModal()">保存</button>
        <button class="action-btn" onclick="openLoadModal()">読込</button>
      </div>
      <div class="my-slots" id="my-inputs"></div>
    </div>
    <div class="team-card">
      <div class="team-label opp">相手
        <button class="action-btn" onclick="quickSaveTeam()">保存</button>
        <button class="action-btn" onclick="quickLoadTeam()">読込</button>
      </div>
      <div class="opp-slots" id="opp-inputs"></div>
    </div>
  </div>

  <button class="analyze-btn" onclick="analyze()">分析開始</button>

  <div id="result-area" style="display:none">
    <p style="font-size:11px;color:var(--muted);margin-bottom:8px">※セルをクリックして詳細対面を表示</p>
    <div class="matrix-card" id="matrix-container"></div>

    <div id="team-advice-card" class="advice-card" style="display:none">
      <div class="advice-title">おすすめ選出 / 型予測 / 苦手警告</div>
      <div id="advice-picks" class="pick-grid"></div>
      <div style="margin-top:2px;margin-bottom:6px"><button class="action-btn" style="padding:8px 12px;font-size:12px" onclick="applySuggestedSelection()">おすすめ3体を選出メモに反映</button></div>
      <div class="advice-section">
        <div class="advice-subtitle">選出理由</div>
        <div id="advice-reasons" class="advice-list"></div>
      </div>
      <div class="advice-section">
        <div class="advice-subtitle">苦手警告</div>
        <div id="advice-warnings" class="advice-list"></div>
      </div>
      <div class="advice-section">
        <div class="advice-subtitle">一貫 / 圧力の可視化</div>
        <div id="advice-pressure" class="pressure-grid"></div>
      </div>
    </div>



    <div id="selected-memo-card" class="advice-card" style="margin-top:0;margin-bottom:16px;border-color:var(--yellow)">
      <div class="advice-title" style="color:var(--yellow)">ワンタップ選出メモ</div>
      <div id="selected-memo-body" style="font-size:12px;line-height:1.7;white-space:pre-wrap;color:var(--text)">まだ選出していません。「おすすめ3体を選出メモに反映」を押すと記録されます。</div>
    </div>

    <div id="detail-card" class="detail-card">
      <div class="compare-grid">
        <div id="my-detail" class="pokemon-detail"></div>
        <div class="vs-label">VS</div>
        <div id="opp-detail" class="pokemon-detail"></div>
      </div>
    </div>
  </div>
</div>

<!-- Save Modal -->
<div id="save-modal" class="modal-overlay" onclick="if(event.target===this)closeSaveModal()">
  <div class="modal">
    <div class="modal-title">チームを保存</div>
    <div id="save-slots"></div>
    <button class="modal-close" onclick="closeSaveModal()">キャンセル</button>
  </div>
</div>

<!-- Load Modal -->
<div id="load-modal" class="modal-overlay" onclick="if(event.target===this)closeLoadModal()">
  <div class="modal">
    <div class="modal-title">チームを読み込み</div>
    <div id="load-slots"></div>
    <button class="modal-close" onclick="closeLoadModal()">キャンセル</button>
  </div>
</div>

<!-- Config Modal -->
<div id="config-modal" class="modal-overlay" onclick="if(event.target===this)closeConfigModal()">
  <div class="modal">
    <div class="modal-title" id="cfg-title">設定</div>

    <div class="cfg-section">
      <div class="cfg-section-title">性格</div>
      <div class="nature-row">
        <select class="nature-select" id="cfg-nature" onchange="onNatureChange()"></select>
      </div>
      <div class="nature-hint" id="cfg-nature-hint"></div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">努力値（EP）</div>
      <div class="ev-header">
        <span style="font-size:10px;color:var(--muted)">各最大32・合計最大66</span>
        <span class="ev-remaining">残り <span id="cfg-ev-rem">66</span>/<span>66</span> pt</span>
      </div>
      <div id="cfg-ev-rows"></div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">技構成</div>
      <div class="move-grid" id="cfg-moves"></div>
    </div>

    <div class="cfg-section">
      <div class="cfg-section-title">持ち物</div>
      <div class="item-wrap">
        <input type="text" id="cfg-item" class="move-input" placeholder="アイテム名" oninput="suggestItem()" onblur="setTimeout(hideItemSug,150)">
        <div class="item-sug-list" id="item-sug-list"></div>
      </div>
    </div>

    <button class="cfg-submit-btn" onclick="applyConfig()">✓ 設定を確定</button>

// ── Stat calc ────────────────────────────────────────────────
// HP: floor((base×2 + 31 + EP×2) × 50/100) + 60
// Other: floor((floor((base×2+31+EP×2)×50/100) + 5) × nature)
function calcStat(base, key, ep, nature) {
  const inner = Math.floor((base * 2 + 31 + ep * 2) * 50 / 100);
  if (key === 'hp') return inner + 60;
  const nat = NATURES[nature] || {b:null,d:null};
  const mod = nat.b === key ? 1.1 : nat.d === key ? 0.9 : 1.0;
  return Math.floor((inner + 5) * mod);
}

const KANA_MAP = {'あ':'ア','い':'イ','う':'ウ','え':'エ','お':'オ','か':'カ','き':'キ','く':'ク','け':'ケ','こ':'コ','が':'ガ','ぎ':'ギ','ぐ':'グ','げ':'ゲ','ご':'ゴ','さ':'サ','し':'シ','す':'ス','せ':'セ','そ':'ソ','ざ':'ザ','じ':'ジ','ず':'ズ','ぜ':'ゼ','ぞ':'ゾ','た':'タ','ち':'チ','つ':'ツ','て':'テ','と':'ト','だ':'ダ','ぢ':'ヂ','づ':'ヅ','で':'デ','ど':'ド','な':'ナ','に':'ニ','ぬ':'ヌ','ね':'ネ','の':'ノ','は':'ハ','ひ':'ヒ','ふ':'フ','へ':'ヘ','ほ':'ホ','ば':'バ','び':'ビ','ぶ':'ブ','べ':'ベ','ぼ':'ボ','ぱ':'パ','ぴ':'ピ','ぷ':'プ','ぺ':'ペ','ぽ':'ポ','ま':'マ','み':'ミ','む':'ム','め':'メ','も':'モ','や':'ヤ','ゆ':'ユ','よ':'ヨ','ら':'ラ','り':'リ','る':'ル','れ':'レ','ろ':'ロ','わ':'ワ','を':'ヲ','ん':'ン','ゃ':'ャ','ゅ':'ュ','ょ':'ョ','っ':'ッ','ー':'ー'};
function h2k(str){return str.split('').map(c=>KANA_MAP[c]||c).join('');}

const K2H_MAP = Object.fromEntries(Object.entries(KANA_MAP).map(([h,k])=>[k,h]));
function k2h(str){return str.split('').map(c=>K2H_MAP[c]||c).join('');}
function normJa(str){
  return k2h((str||'').toString())
    .replace(/[\s　]+/g,'')
    .toLowerCase();
}
function matchJaKeyword(name, query){
  const a = normJa(name);
  const b = normJa(query);
  return !!b && a.includes(b);
}

function getSprite(name) {
  const ab = name.substring(0,3).replace(/'/g,'');
  if (ALT_SPRITES[name]) {
    return `<img src="${ALT_SPRITES[name]}" alt="${name}" style="width:100%;height:100%;object-fit:contain">`;
  }
  const id = SM[name];
  if (!id) return `<div style="font-size:16px;font-weight:bold;color:var(--muted)">${ab}</div>`;
  const url = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
  return `<img src="${url}" alt="${name}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated" onerror="this.parentElement.textContent='${ab}'">`;
}

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<div class="toast-icon">${type==='success'?'✓':'!'}</div><div class="toast-message">${msg}</div>`;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.animation='slideIn .3s ease-out reverse';setTimeout(()=>t.remove(),300);},2500);
}

// ── Inputs init ───────────────────────────────────────────────
function initInputs() {
  const myC = document.getElementById('my-inputs');
  for(let i=1;i<=6;i++) {
    const row = document.createElement('div');
    row.className = 'my-slot';
    row.innerHTML = `
      <div style="position:relative;flex:1">
        <input type="text" id="my${i}" class="poke-input" placeholder="${i}体目" oninput="suggest('my${i}')">
        <div id="sug_my${i}" class="suggest-list"></div>
      </div>
      <button class="config-btn" id="cfgbtn${i}" onclick="openConfigModal(${i})" title="性格・努力値・技を設定">⚙</button>`;
    myC.appendChild(row);
  }
  const oppC = document.getElementById('opp-inputs');
  for(let i=1;i<=6;i++) {
    const d = document.createElement('div');
    d.style.position='relative';
    d.innerHTML = `<input type="text" id="opp${i}" class="poke-input" placeholder="${i}体目" oninput="suggest('opp${i}')"><div id="sug_opp${i}" class="suggest-list"></div>`;
    oppC.appendChild(d);
  }
}

function suggest(id) {
  const val = document.getElementById(id).value;
  const list = document.getElementById('sug_'+id);
  list.innerHTML = '';
  if(!val){list.style.display='none';return;}
  const sv = h2k(val);
  const matches = Object.keys(DB).filter(n=>n.includes(val)||n.includes(sv)).slice(0,5);
  if(matches.length){
    list.style.display='block';
    matches.forEach(m=>{
      const item=document.createElement('div');
      item.className='suggest-item';
      item.textContent=m;
      item.onclick=()=>{document.getElementById(id).value=m;list.style.display='none';analyze();};
      list.appendChild(item);
    });
  } else list.style.display='none';
}

// ── Config Modal ───────────────────────────────────────────────
function openConfigModal(slot) {
  editSlot = slot;
  const pokeName = document.getElementById('my'+slot).value;
  // ポケモンが未選択/DB未登録でもモーダルは開く（実数値表示はスキップ）
  editPoke = (pokeName && DB[pokeName]) ? pokeName : null;
  tempEvs = {...myConfig[slot].evs};

  document.getElementById('cfg-title').textContent =
    editPoke ? `${pokeName} の設定` : `スロット${slot} の設定（ポケモン未選択）`;

  document.getElementById('cfg-item').value = myConfig[slot].item || '';  

  // Nature select（onNatureChangeはEV行作成後に呼ぶ）
  const natSel = document.getElementById('cfg-nature');
  natSel.innerHTML = Object.keys(NATURES).map(n=>`<option value="${n}"${n===myConfig[slot].nature?' selected':''}>${n}</option>`).join('');

  // EV rows を先に作成（onNatureChange→refreshEVDisplayが参照するDOM）
  const evRows = document.getElementById('cfg-ev-rows');
  evRows.innerHTML = '';
  STAT_KEYS.forEach(k=>{
    const r=document.createElement('div');
    r.className='ev-row';
    r.innerHTML=`
      <span class="ev-key">${STAT_LABELS[k]}</span>
      <button class="ev-btn" onclick="changeEV('${k}',-1)">−</button>
      <input type="number" class="ev-val-input" id="ev-i-${k}" value="0" min="0" max="32" oninput="inputEV('${k}')">
      <button class="ev-btn" onclick="changeEV('${k}',1)">+</button>
      <div class="ev-bar-wrap"><div class="ev-bar" id="ev-b-${k}" style="width:0%"></div></div>
      <span class="ev-stat-val nu" id="ev-s-${k}">—</span>`;
    evRows.appendChild(r);
  });

  // Move inputs
  const moveGrid = document.getElementById('cfg-moves');
  moveGrid.innerHTML = '';
  for(let i=0;i<4;i++){
    const w=document.createElement('div');
    w.className='move-wrap';
    w.innerHTML=`
      <input type="text" class="move-input" id="cm${i}" placeholder="技${i+1}" value="${myConfig[slot].moves[i]||''}" oninput="suggestMove(${i})" onblur="setTimeout(()=>hideMSug(${i}),150)">
      <div class="msug-list" id="ms${i}"></div>`;
    moveGrid.appendChild(w);
  }

  // EV行作成後にnature hint + EV表示を更新
  onNatureChange();
  hideItemSug();
  document.getElementById('config-modal').style.display='flex';
}

function onNatureChange(){
  const nat = NATURES[document.getElementById('cfg-nature').value]||{b:null,d:null};
  const hintEl = document.getElementById('cfg-nature-hint');
  if(nat.b){
    hintEl.innerHTML = `<span class="nh-up">${STAT_LABELS[nat.b]}↑</span> <span class="nh-down">${STAT_LABELS[nat.d]}↓</span>`;
  } else {
    hintEl.innerHTML = '<span style="color:var(--muted)">補正なし</span>';
  }
  refreshEVDisplay();
}

function refreshEVDisplay() {
  if(!editSlot) return;
  const poke = editPoke ? DB[editPoke] : null;
  const stats = poke ? (poke.stats||{}) : {};
  const nature = document.getElementById('cfg-nature').value;
  const nat = NATURES[nature]||{b:null,d:null};
  const total = Object.values(tempEvs).reduce((a,b)=>a+b,0);
  document.getElementById('cfg-ev-rem').textContent = MAX_TOTAL_EP - total;

  STAT_KEYS.forEach(k=>{
    const ep = tempEvs[k]||0;
    const base = stats[k]||0;
    const actual = base > 0 ? calcStat(base, k, ep, nature) : '—';
    document.getElementById(`ev-i-${k}`).value = ep;
    document.getElementById(`ev-b-${k}`).style.width = (ep/MAX_EP*100)+'%';
    const sEl = document.getElementById(`ev-s-${k}`);
    sEl.textContent = actual;
    sEl.className = 'ev-stat-val';
    if(k!=='hp'){
      if(nat.b===k) sEl.classList.add('up');
      else if(nat.d===k) sEl.classList.add('dn');
      else sEl.classList.add('nu');
    } else sEl.classList.add('nu');
  });
}

function changeEV(key, delta) {
  const ep = (tempEvs[key]||0) + delta;
  if(ep < 0 || ep > MAX_EP) return;
  const total = Object.values(tempEvs).reduce((a,b)=>a+b,0);
  if(delta > 0 && total >= MAX_TOTAL_EP) return;
  tempEvs[key] = ep;
  refreshEVDisplay();
}
function inputEV(key){
  let val = parseInt(document.getElementById(`ev-i-${key}`).value) || 0;
  if(val < 0) val = 0;
  if(val > MAX_EP) val = MAX_EP;

  const totalWithout = Object.entries(tempEvs)
    .filter(([k])=>k!==key)
    .reduce((a,[,v])=>a+v,0);

  if(totalWithout + val > MAX_TOTAL_EP){
    val = MAX_TOTAL_EP - totalWithout;
  }

  tempEvs[key] = val;
  document.getElementById(`ev-i-${key}`).value = val;
  refreshEVDisplay();
}
function applyConfig() {
  if(!editSlot) return;
  myConfig[editSlot].nature = document.getElementById('cfg-nature').value;
  myConfig[editSlot].evs = {...tempEvs};
  myConfig[editSlot].item = document.getElementById('cfg-item').value;
  for(let i=0;i<4;i++) myConfig[editSlot].moves[i] = document.getElementById('cm'+i).value;
  updateCfgBtn(editSlot);
  closeConfigModal();
  showToast(`${editPoke} の設定を保存しました！`,'success');
}

function updateCfgBtn(slot) {
  const btn = document.getElementById('cfgbtn'+slot);
  if(!btn) return;
  const cfg = myConfig[slot];
  const hasAny = cfg.nature !== 'まじめ' || Object.values(cfg.evs).some(v=>v>0) || cfg.moves.some(m=>m) || !!cfg.item;
  btn.classList.toggle('configured', hasAny);
}

function closeConfigModal() {
  document.getElementById('config-modal').style.display='none';
  editSlot=null; editPoke=null;
}

// ── Move Suggest ───────────────────────────────────────────────
function suggestMove(idx) {
  const inp = document.getElementById('cm'+idx);
  const list = document.getElementById('ms'+idx);
  const val = inp.value.trim();
  list.innerHTML='';
  if(!val || Object.keys(movesDB).length===0){ list.style.display='none'; return; }

  const matches = Object.keys(movesDB)
    .filter(name => matchJaKeyword(name, val))
    .sort((a,b) => {
      const an = normJa(a), bn = normJa(b), q = normJa(val);
      const ap = an.startsWith(q) ? 0 : 1;
      const bp = bn.startsWith(q) ? 0 : 1;
      return ap - bp || a.length - b.length;
    })
    .slice(0,10);

  if(!matches.length){ list.style.display='none'; return; }
  list.style.display='block';

  matches.forEach(m=>{
    const mv = movesDB[m] || {};
    const item = document.createElement('div');
    item.className='msug-item';
    const tc = mv.type ? `type-${mv.type}` : '';
    const pw = mv.power ?? '—';
    const cat = mv.category || '';
    item.innerHTML = `
      <span class="msug-item-name">${m}</span>
      <span class="msug-meta">

function suggestItem() {
  const inp = document.getElementById('cfg-item');
  const list = document.getElementById('item-sug-list');
  if(!inp || !list) return;
  const val = inp.value.trim();
  list.innerHTML = '';
  if(!val || Object.keys(itemsDB).length===0){ list.style.display='none'; return; }

  const matches = Object.keys(itemsDB)
    .filter(name => matchJaKeyword(name, val))
    .sort((a,b) => {
      const an = normJa(a), bn = normJa(b), q = normJa(val);
      const ap = an.startsWith(q) ? 0 : 1;
      const bp = bn.startsWith(q) ? 0 : 1;
      return ap - bp || a.length - b.length;
    })
    .slice(0,10);

  if(!matches.length){ list.style.display='none'; return; }
  list.style.display='block';

  matches.forEach(name=>{
    const data = itemsDB[name] || {};
    const row = document.createElement('div');
    row.className = 'item-sug-item';
    row.innerHTML = `<div class="item-sug-name">${name}</div><div class="item-sug-desc">${data.desc || ''}</div>`;
    row.onclick = ()=>{ inp.value = name; list.style.display='none'; };
    list.appendChild(row);
  });
}

  const stats = p.stats||{};

    const base=stats[k]||0, ep=evs[k]||0;

      const mv=movesDB[m];
      const tc=mv&&mv.type?`bg-${mv.type}`:'';
      const pw=mv&&mv.power?` ${mv.power}`:'';
      return `<span class="tag ${tc}">${m}${pw}</span>`;
    }).join('')}</div>`;
  }
  const itemHTML = item ? `<div class="moves-box"><div class="moves-title">持ち物</div><span class="tag" style="border-color:var(--green)">${item}</span>${itemsDB[item]?.desc?`<div style="font-size:10px;color:var(--muted);margin-top:4px;line-height:1.5">${itemsDB[item].desc}</div>`:''}</div>` : '';

const ROLE_WEIGHTS = {
  '積み': 1.3,
  '先制技': 1.2,
  '終盤エース': 1.15,
  '高速物理': 1.15,
  '高速エース': 1.15,
  '特殊アタッカー': 1.05,
  '崩し': 1.08,
  'ストッパー': 1.1,
  'ステロ': 1.05
};

function safeTypesOf(name){
  return (DB[name] && Array.isArray(DB[name].types)) ? DB[name].types : [];
}
function getMetaHint(name){
  return META_HINTS[name] || {roles:[], notes:[]};
}
function bestAttackEffect(attackerName, defenderName){
  const atkTypes = safeTypesOf(attackerName);
  const defTypes = safeTypesOf(defenderName);
  let best = 0;
  atkTypes.forEach(t => {
    const e = getEff(t, defTypes);
    if(e > best) best = e;
  });
  return best;
}
function bestReturnEffect(defenderName, attackerName){
  return bestAttackEffect(defenderName, attackerName);
}
function scoreMatchup(myName, oppName){
  const atk = bestAttackEffect(myName, oppName);
  const back = bestReturnEffect(oppName, myName);
  let score = atk * 2 - back;
  if(atk >= 4) score += 2.5;
  else if(atk >= 2) score += 1.25;
  if(back >= 4) score -= 2.5;
  else if(back >= 2) score -= 1.25;
  const hint = getMetaHint(myName);
  (hint.roles || []).forEach(r => { score *= (ROLE_WEIGHTS[r] || 1); });
  return score;
}
function aggregateWeakPressure(my, opp){
  const interesting = ['じめん','フェアリー','こおり','でんき','ほのお','みず','かくとう'];
  return interesting.map(type => {
    let weak = 0;
    opp.forEach(o => {
      const defTypes = safeTypesOf(o.name);
      const e = getEff(type, defTypes);
      if(e >= 2) weak++;
    });
    return {type, weak, ratio: opp.length ? Math.round((weak / opp.length) * 100) : 0};
  }).sort((a,b)=> b.weak - a.weak);
}
function inferThreatWarnings(my, opp){
  const warnings = [];
  const oppTypesFlat = [];
  opp.forEach(o => safeTypesOf(o.name).forEach(t => oppTypesFlat.push(t)));

  const countType = (t) => oppTypesFlat.filter(x => x === t).length;

  if(countType('でんき') >= 2) warnings.push({tag:'一貫', text:'相手に でんき が多め。じめん を切ると通されやすいです。'});
  if(countType('フェアリー') >= 2) warnings.push({tag:'一貫', text:'相手に フェアリー が多め。ドラゴン軸は選出を慎重に。'});
  if(countType('こおり') >= 2) warnings.push({tag:'一貫', text:'相手に こおり 打点が多め。ドラゴン / ひこう を重ねすぎない方が安全です。'});
  if(countType('かくとう') >= 2) warnings.push({tag:'圧力', text:'かくとう 打点が通りやすい並びの可能性があります。ゴーストやフェアリーを絡めたいです。'});
  if(countType('ほのお') >= 2) warnings.push({tag:'圧力', text:'ほのお 打点が濃いです。みず / じめん で圧を返せる駒を優先したいです。'});

  opp.forEach(o => {
    const hint = getMetaHint(o.name);
    const roles = hint.roles || [];
    if(roles.includes('積み')) warnings.push({tag:'型警戒', text:o.name + ' は積み展開が多め。ストッパーや先制技を残したいです。'});
    if(roles.includes('先制技')) warnings.push({tag:'型警戒', text:o.name + ' は先制技で締めに来やすいです。終盤のHP管理を意識。'});
    if(roles.includes('ステロ')) warnings.push({tag:'型警戒', text:o.name + ' は起点作成寄りも多め。受け回しだけに寄せすぎない方が安全です。'});
  });

  const uniq = [];
  const seen = {};
  warnings.forEach(w => {
    const k = w.tag + '|' + w.text;
    if(!seen[k]){
      seen[k] = true;
      uniq.push(w);
    }
  });
  return uniq.slice(0, 6);
}
function buildAdvancedAdvice(my, opp){
  const card = document.getElementById('team-advice-card');
  const picksEl = document.getElementById('advice-picks');
  const reasonsEl = document.getElementById('advice-reasons');
  const warningsEl = document.getElementById('advice-warnings');
  const pressureEl = document.getElementById('advice-pressure');
  if(!card || !picksEl || !reasonsEl || !warningsEl || !pressureEl) return;

  card.style.display = 'block';
  picksEl.innerHTML = '';
  reasonsEl.innerHTML = '';
  warningsEl.innerHTML = '';
  pressureEl.innerHTML = '';

  if(!my.length || !opp.length){
    reasonsEl.innerHTML = '<div class="advice-line">自分と相手のポケモンを1体以上入力してください。</div>';
    return;
  }

  const scores = my.map(m => {
    let total = 0;
    const good = [];
    opp.forEach(o => {
      const sc = scoreMatchup(m.name, o.name);
      total += sc;
      if(sc > 1.5) good.push(o.name);
    });
    return {name:m.name, total, good};
  }).sort((a,b)=> b.total - a.total);

  const top = scores.slice(0,3);
  latestSuggestedNames = top.map(p => p.name);
  top.forEach((p, idx) => {
    const hint = getMetaHint(p.name);
    const rolesHtml = (hint.roles || []).slice(0,3).map(r => `<span class="role-chip">${r}</span>`).join('');
    const goodText = p.good.length ? `強め: ${p.good.slice(0,3).join(' / ')}` : '広く等倍以上を取りやすい枠';
    picksEl.innerHTML += `
      <div class="pick-item">
        <div class="pick-rank">${idx+1}位</div>
        <div class="pick-name">${p.name}</div>
        <div style="margin-bottom:6px">${rolesHtml}</div>
        <div class="pick-score">総合スコア ${p.total.toFixed(1)} / ${goodText}</div>
      </div>`;
  });

  const pressures = aggregateWeakPressure(my, opp);
  const topPressure = pressures.slice(0,4);
  topPressure.forEach(p => {
    reasonsEl.innerHTML += `<div class="advice-line">・相手に <strong>${p.type}</strong> が ${p.weak}/${opp.length} 体へ通りやすいです。${p.type} 打点を持つ駒を優先すると組み立てやすいです。</div>`;
  });

  renderAiBasis(my, opp);

  const roleLines = [];
  opp.forEach(o => {
    const hint = getMetaHint(o.name);
    if((hint.roles || []).length || (hint.notes || []).length){
      roleLines.push(`<div class="advice-line"><span class="warn-chip">型予測</span><strong>${o.name}</strong> : ${(hint.roles || []).join(' / ') || '標準型'}${(hint.notes && hint.notes[0]) ? ' — ' + hint.notes[0] : ''}</div>`);
    }
  });
  if(!roleLines.length){
    reasonsEl.innerHTML += `<div class="advice-line">・相性表の上位3体を基準に、通りの良い打点と終盤のしめ性能を優先した安定選出です。</div>`;
  } else {
    reasonsEl.innerHTML += roleLines.join('');
  }

  const warns = inferThreatWarnings(my, opp);
  if(warns.length){
    warns.forEach(w => {
      warningsEl.innerHTML += `<div class="advice-line"><span class="warn-chip">${w.tag}</span>${w.text}</div>`;
    });
  } else {
    warningsEl.innerHTML = `<div class="advice-line">大きなタイプ偏りは薄めです。上位3体をベースに、初手の通りと終盤の詰め筋を優先すると安定します。</div>`;
  }

  topPressure.forEach(p => {
    pressureEl.innerHTML += `
      <div class="pressure-row">
        <div class="pressure-head"><span>${p.type} の通り</span><strong>${p.weak}/${opp.length}体</strong></div>
        <div class="pressure-bar-wrap"><div class="pressure-bar" style="width:${p.ratio}%"></div></div>
      </div>`;
  });
}

}

// ── Analyze ────────────────────────────────────────────────────
function getEff(at, defTypes) {
  let r=1;
  defTypes.forEach(t=>{if(CHART[at]&&CHART[at][t]!==undefined)r*=CHART[at][t];});
  return r;
}

function safeTypesOf(name){
  return (DB[name] && Array.isArray(DB[name].types)) ? DB[name].types : [];
}

function scoreMatchup(myName, oppName){
  var myTypes = safeTypesOf(myName);
  var oppTypes = safeTypesOf(oppName);
  var best = 0;
  for(var i=0;i<myTypes.length;i++){
    var e = getEff(myTypes[i], oppTypes);
    if(e > best) best = e;
  }
  var back = 0;
  for(var j=0;j<oppTypes.length;j++){
    var e2 = getEff(oppTypes[j], myTypes);
    if(e2 > back) back = e2;
  }
  var score = best * 2 - back;
  if(best >= 2) score += 2;
  if(back >= 2) score -= 2;
  return score;
}


function analyze() {
  const my=[], opp=[];
  for(let i=1;i<=6;i++){
    const n1=(document.getElementById('my'+i).value || '').trim();
    if(DB[n1]) my.push({name:n1,data:DB[n1]});
    const n2=(document.getElementById('opp'+i).value || '').trim();
    if(DB[n2]) opp.push({name:n2,data:DB[n2]});
  }

  document.getElementById('result-area').style.display='block';
  buildAdvancedAdvice(my, opp);
  setTimeout(()=>document.getElementById('team-advice-card').scrollIntoView({behavior:'smooth',block:'start'}),100);

  if(!my.length || !opp.length){
    document.getElementById('matrix-container').innerHTML = '<div style="font-size:12px;color:var(--muted)">自分と相手のポケモンを1体以上入力してください。</div>';
    return;
  }

  let html=`<table><tr><th>自分＼相手</th>${opp.map(p=>`<th>${p.name}</th>`).join('')}</tr>`;
  my.forEach(m=>{
    html+=`<tr><td style="background:var(--surface2)"><strong>${m.name}</strong></td>`;
    opp.forEach(o=>{
      let max=0;
      m.data.types.forEach(at=>{const e=getEff(at,o.data.types);if(e>max)max=e;});
      const cls=max>=2?'eff-2':max<=0.5?'eff-05':'';
      html+=`<td class="${cls}" onclick="showDetail('${m.name}','${o.name}')">${max}x</td>`;
    });
    html+='</tr>';
  });
  html+='</table>';
  document.getElementById('matrix-container').innerHTML=html;
}

function clearAll(){
  for(let i=1;i<=6;i++){
    const m=document.getElementById('my'+i); if(m) m.value='';
    const o=document.getElementById('opp'+i); if(o) o.value='';
    myConfig[i]=mkCfg();
    updateCfgBtn(i);
  }
  document.getElementById('result-area').style.display='none';
  document.getElementById('detail-card').style.display='none';
  document.getElementById('selected-memo-body').textContent='まだ選出していません。「おすすめ3体を選出メモに反映」を押すと記録されます。';
  latestSuggestedNames=[];
  showToast('クリアしました！');
}


function quickSaveTeam(){

function quickLoadTeam(){

function openSaveModal(){
  const sl=document.getElementById('save-slots');
  sl.innerHTML='';
  for(let i=1;i<=6;i++){
    const raw=localStorage.getItem(`pk_myteam_${i}`);
    let prev='空きスロット';
    if(raw){try{const d=JSON.parse(raw);prev=(d.names||d).filter(x=>x).join(', ').substring(0,28)||'空きスロット';}catch(e){}}
    const s=document.createElement('div');
    s.className='team-slot';
    s.onclick=()=>saveToSlot(i);
    s.innerHTML=`<div><div class="team-slot-number">スロット ${i}</div><div class="team-slot-preview">${prev}</div></div>`;
    sl.appendChild(s);
  }
  document.getElementById('save-modal').style.display='flex';
}
function closeSaveModal(){document.getElementById('save-modal').style.display='none';}

function saveToSlot(n){
  const names=[];
  for(let i=1;i<=6;i++) names.push(document.getElementById('my'+i).value);
  const deep={};
  for(let i=1;i<=6;i++) deep[i]={nature:myConfig[i].nature,evs:{...myConfig[i].evs},moves:[...myConfig[i].moves],item:myConfig[i].item||''};
  localStorage.setItem(`pk_myteam_${n}`,JSON.stringify({names,configs:deep}));
  showToast(`スロット${n}に保存しました！`);
  closeSaveModal();
}

function openLoadModal(){
  const sl=document.getElementById('load-slots');
  sl.innerHTML='';
  for(let i=1;i<=6;i++){
    const raw=localStorage.getItem(`pk_myteam_${i}`);
    let prev='空きスロット', hasData=false;
    if(raw){try{const d=JSON.parse(raw);const arr=d.names||d;prev=arr.filter(x=>x).join(', ').substring(0,28)||'空きスロット';hasData=true;}catch(e){}}
    const s=document.createElement('div');
    s.className=`team-slot ${hasData?'':'empty'}`;
    if(hasData) s.onclick=()=>loadFromSlot(i);
    s.innerHTML=`<div><div class="team-slot-number">スロット ${i}</div><div class="team-slot-preview">${prev}</div></div>`;
    sl.appendChild(s);
  }
  document.getElementById('load-modal').style.display='flex';
}
function closeLoadModal(){document.getElementById('load-modal').style.display='none';}

function loadFromSlot(n){
  const raw=localStorage.getItem(`pk_myteam_${n}`);
  if(!raw) return;
  try{
    let d=JSON.parse(raw);
    if(Array.isArray(d)) d={names:d,configs:{}};
    d.names.forEach((v,i)=>document.getElementById('my'+(i+1)).value=v);
    if(d.configs){
      Object.keys(d.configs).forEach(k=>{
        const slot=parseInt(k);
        if(myConfig[slot]&&d.configs[k]){
          myConfig[slot]={
            nature:d.configs[k].nature||'まじめ',
            evs:{...(d.configs[k].evs||{hp:0,atk:0,def:0,spA:0,spD:0,spe:0})},
            moves:[...(d.configs[k].moves||['','','',''])],
            item:d.configs[k].item||''
          };
          updateCfgBtn(slot);
        }
      });
    }
    showToast(`スロット${n}を読み込みました！`);
    closeLoadModal();
    analyze();
  }catch(e){showToast('読み込みに失敗しました','error');}
}
